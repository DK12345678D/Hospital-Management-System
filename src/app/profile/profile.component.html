<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" routerLink="/home">
      <i class="bi bi-hospital me-2 text-info fs-4"></i>
      <span class="fw-bold tracking-tight">SANJIVANI</span>
      <span class="ms-1 fw-light text-secondary">HEALTH</span>
    </a>
  </div>
</nav>

<div class="container py-5 d-flex justify-content-center align-items-center mb-5 animate-fade-in">
  <div class="col-md-9 col-lg-6">
    <div class="card border-0 shadow-2xl p-5 bg-white rounded-5">
      <div class="text-center mb-5">
        <h2 class="fw-black text-dark tracking-tighter mb-2 fs-2 uppercase">USER PROFILE PROTOCOL</h2>
        <p class="text-secondary small fw-medium uppercase mb-0 tracking-widest opacity-50">Identity & Communication Synchronization</p>
      </div>

      <div *ngIf="successMessage" class="alert alert-success border-0 rounded-4 py-3 mb-4 d-flex align-items-center gap-2">
        <i class="bi bi-check-circle-fill"></i>
        {{successMessage}}
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger border-0 rounded-4 py-3 mb-4 d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-octagon-fill"></i>
        {{errorMessage}}
      </div>

      <form (ngSubmit)="onUpdate()">
        <div class="row g-4">
          <div class="col-12">
            <label class="form-label text-xs fw-bold text-uppercase text-secondary opacity-75 mb-2">EMAIL (READ-ONLY)</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 px-3 opacity-50"><i class="bi bi-envelope-at text-secondary"></i></span>
              <input type="text" class="form-control border-0 bg-light py-2-5 shadow-none opacity-50" [(ngModel)]="user.email" name="email" readonly>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label text-xs fw-bold text-uppercase text-secondary opacity-75 mb-2">FULL NAME</label>
            <div class="input-group group-focus">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-person-gear text-secondary"></i></span>
              <input type="text" class="form-control border-0 bg-light py-2-5 shadow-none fw-medium" [(ngModel)]="user.fullName" name="fullName" placeholder="Update Full Name" required>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label text-xs fw-bold text-uppercase text-secondary opacity-75 mb-2">MOBILE CONTACT</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-phone-flip text-secondary"></i></span>
              <input type="text" class="form-control border-0 bg-light py-2-5 shadow-none fw-medium" [(ngModel)]="user.phoneNumber" name="phoneNumber" placeholder="Update Mobile #" required>
            </div>
          </div>

          <div class="col-12 mt-5">
            <button type="submit" [disabled]="loading" class="btn btn-dark w-100 py-3 rounded-4 shadow-lg-hover transition-all d-flex align-items-center justify-content-center gap-2">
              <i *ngIf="!loading" class="bi bi-box-arrow-in-up fs-5"></i>
              <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
              <span class="fw-bold tracking-wider">{{ loading ? 'SYNCHRONIZING...' : 'SYNCHRONIZE PROFILE' }}</span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
