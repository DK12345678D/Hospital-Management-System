<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
/>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-lg py-3">
  <div class="container-fluid px-lg-5">
    <a class="navbar-brand d-flex align-items-center" routerLink="/home">
      <div class="brand-icon brand-circle bg-black text-danger p-2 me-3 shadow-lg border border-danger border-opacity-30" style="width: 44px; height: 44px;">
        <i class="bi bi-heart-pulse-fill fs-4 text-danger"></i>
      </div>
      <div class="lh-1">
        <div class="fw-bold fs-4 tracking-tight text-white mb-0">SANJIVANI <span class="text-danger fw-light">GLOBAL</span></div>
        <div class="small fw-light opacity-50 text-uppercase tracking-widest text-danger" style="font-size: 0.65rem;">Precision Enrollment</div>
      </div>
    </a>
    <div class="ms-auto">
      <ul class="navbar-nav mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link d-flex align-items-center" routerLink="/docdash">
            <i class="bi bi-arrow-left-circle-fill me-2 fs-5"></i> Back to Dashboard
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-5 animate-fade-in">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="text-center mb-5">
        <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle mb-3" style="width: 72px; height: 72px;">
          <i class="bi bi-person-plus-fill fs-2"></i>
        </div>
        <h2 class="fw-bold text-dark">Enroll New Patient</h2>
        <p class="text-secondary">Provide comprehensive details for accurate medical record registration.</p>
      </div>

      <div class="card p-4 shadow-lg border-0 bg-white">
        <form (ngSubmit)="onSubmit()" class="needs-validation">
          
          <div class="row g-4">
            <!-- Patient Name -->
            <div class="col-12">
              <label class="form-label fw-semibold mb-2 fs-7 uppercase tracking-wider text-muted">PATIENT IDENTITY</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-0 shadow-sm px-3"><i class="bi bi-person fs-5"></i></span>
                <input
                  type="text"
                  class="form-control border-0 shadow-sm bg-light"
                  [(ngModel)]="patient.name"
                  name="name"
                  placeholder="Full name of patient"
                  required
                />
              </div>
            </div>

            <!-- Medical Attributes (Age / Blood) -->
            <div class="col-md-6">
              <label class="form-label fw-semibold mb-2 text-muted small">BIOMETRIC AGE</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-0 shadow-sm px-3"><i class="bi bi-calendar-check fs-5"></i></span>
                <input
                  type="text"
                  class="form-control border-0 shadow-sm bg-light"
                  [(ngModel)]="patient.age"
                  name="age"
                  placeholder="e.g. 24"
                />
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold mb-2 text-muted small">BLOOD GROUP</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-0 shadow-sm px-3"><i class="bi bi-droplet-fill fs-5 text-danger"></i></span>
                <select 
                  class="form-select border-0 shadow-sm bg-light py-2" 
                  [(ngModel)]="patient.blood" 
                  name="blood"
                  required>
                  <option value="" disabled selected>Select Group</option>
                  <option value="A+">A Positive (A+)</option>
                  <option value="A-">A Negative (A-)</option>
                  <option value="B+">B Positive (B+)</option>
                  <option value="B-">B Negative (B-)</option>
                  <option value="AB+">AB Positive (AB+)</option>
                  <option value="AB-">AB Negative (AB-)</option>
                  <option value="O+">O Positive (O+)</option>
                  <option value="O-">O Negative (O-)</option>
                </select>
              </div>
            </div>

            <!-- Prescription Details -->
            <div class="col-12">
              <label class="form-label fw-semibold mb-2 text-muted small">CLINICAL OBSERVATION & PRESCRIPTION</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-0 shadow-sm px-3"><i class="bi bi-journal-medical fs-5"></i></span>
                <input
                  type="text"
                  class="form-control border-0 shadow-sm bg-light"
                  [(ngModel)]="patient.prescription"
                  name="prescription"
                  placeholder="Initial diagnosis note"
                />
              </div>
            </div>

            <!-- Dosage & Urgency -->
            <div class="col-md-6">
              <label class="form-label fw-semibold mb-2 text-muted small">PLANNED DOSAGE</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-0 shadow-sm px-3"><i class="bi bi-capsule fs-5"></i></span>
                <input
                  type="text"
                  class="form-control border-0 shadow-sm bg-light"
                  [(ngModel)]="patient.dose"
                  name="dose"
                  placeholder="Daily intake schedule"
                />
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold mb-2 text-muted small">CASE URGENCY</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-0 shadow-sm px-3"><i class="bi bi-lightning-charge-fill fs-5 text-warning"></i></span>
                <select 
                  class="form-select border-0 shadow-sm bg-light" 
                  [(ngModel)]="patient.urgency" 
                  name="urgency">
                  <option value="" disabled selected>Select Level</option>
                  <option value="Stable">Stable</option>
                  <option value="Moderate">Moderate</option>
                  <option value="Critical">Critical</option>
                  <option value="Emergency">Emergency</option>
                </select>
              </div>
            </div>

            <!-- Fees & Visit Date (Newest) -->
            <div class="col-md-6">
              <label class="form-label fw-semibold mb-2 text-muted small">FEES ESTIMATED</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-0 shadow-sm px-3"><i class="bi bi-currency-dollar fs-5"></i></span>
                <input
                  type="text"
                  class="form-control border-0 shadow-sm bg-light"
                  [(ngModel)]="patient.fees"
                  name="fees"
                  placeholder="Service charges"
                />
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold mb-2 text-muted small">LATEST VISIT DATE</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-0 shadow-sm px-3"><i class="bi bi-calendar-event fs-5"></i></span>
                <input
                  type="date"
                  class="form-control border-0 shadow-sm bg-light"
                  [(ngModel)]="patient.latestVisit"
                  name="latestVisit"
                />
              </div>
            </div>

            <div class="col-12 mt-4 pt-3">
              <button class="btn btn-primary w-100 py-3 d-flex align-items-center justify-content-center gap-2" type="submit">
                <i class="bi bi-save2-fill"></i> REGISTER PATIENT DATA
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
