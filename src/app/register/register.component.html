<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100 py-5" style="background: url('medical_security_background_premium_1774851912935.png') no-repeat center center / cover;">
  <div class="overlay position-absolute w-100 h-100 top-0 start-0" style="background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px);"></div>
  
  <div class="container position-relative z-index-3">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="glass-card p-5 rounded-5 border border-white border-opacity-10 shadow-2xl animate-fade-in" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);">
          
          <div class="text-center mb-5">
            <div class="brand-icon bg-info text-dark p-3 rounded-circle d-inline-flex mb-3 shadow-lg">
              <i class="bi bi-person-plus-fill fs-3"></i>
            </div>
            <h2 class="text-dark fw-bold tracking-tight mb-1">Create Account</h2>
            <p class="text-secondary small mb-5">Select your role and provide your credentials</p>
            
            <!-- Organic Role Selection -->
            <div class="role-selector d-flex justify-content-center gap-3 mb-5">
              <label class="role-option" [class.active]="user.role === 'PATIENT'">
                <input type="radio" name="role" value="PATIENT" [(ngModel)]="user.role">
                <div class="role-box px-4 py-3 rounded-4 shadow-sm border">
                  <i class="bi bi-person-heart fs-4 d-block mb-1"></i>
                  <span class="small fw-bold text-uppercase ls-1">Patient</span>
                </div>
              </label>
              <label class="role-option" [class.active]="user.role === 'DOCTOR'">
                <input type="radio" name="role" value="DOCTOR" [(ngModel)]="user.role">
                <div class="role-box px-4 py-3 rounded-4 shadow-sm border">
                  <i class="bi bi-person-badge fs-4 d-block mb-1"></i>
                  <span class="small fw-bold text-uppercase ls-1">Doctor</span>
                </div>
              </label>
              <label class="role-option" [class.active]="user.role === 'ADMIN'">
                <input type="radio" name="role" value="ADMIN" [(ngModel)]="user.role">
                <div class="role-box px-4 py-3 rounded-4 shadow-sm border">
                  <i class="bi bi-shield-lock fs-4 d-block mb-1"></i>
                  <span class="small fw-bold text-uppercase ls-1">Admin</span>
                </div>
              </label>
            </div>
          </div>

          <form (ngSubmit)="onRegister()">
            <div class="row g-4">
              <div class="col-12">
                <label class="form-label text-muted small fw-bold text-uppercase ls-1 mb-2">Full Identity Name</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0 text-primary"><i class="bi bi-person-fill"></i></span>
                  <input type="text" class="form-control bg-light border-0 py-3" [(ngModel)]="user.fullName" name="fullName" placeholder="John Doe" required>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label text-muted small fw-bold text-uppercase ls-1 mb-2">Email Identifier</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0 text-primary"><i class="bi bi-envelope-at-fill"></i></span>
                  <input type="email" class="form-control bg-light border-0 py-3" [(ngModel)]="user.email" name="email" placeholder="john@med.com" required>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label text-muted small fw-bold text-uppercase ls-1 mb-2">Mobile Response</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0 text-primary"><i class="bi bi-phone-fill"></i></span>
                  <input type="text" class="form-control bg-light border-0 py-3" [(ngModel)]="user.phoneNumber" name="phoneNumber" placeholder="+91..." required>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label text-muted small fw-bold text-uppercase ls-1 mb-2">Secure Path</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0 text-primary"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" class="form-control bg-light border-0 py-3" [(ngModel)]="user.password" name="password" placeholder="••••••••" required>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label text-muted small fw-bold text-uppercase ls-1 mb-2">Confirm Key</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0 text-primary"><i class="bi bi-shield-check"></i></span>
                  <input type="password" class="form-control bg-light border-0 py-3" [(ngModel)]="user.confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                </div>
              </div>

              <div class="col-12 mt-5">
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-lg d-flex align-items-center justify-content-center gap-2">
                  <i class="bi bi-person-check-fill fs-5"></i>
                  Enroll In Network
                </button>
              </div>
            </div>

            <div class="text-center mt-5">
              <span class="text-muted small">Already registered? </span>
              <a routerLink="/patientlogin" class="text-primary small text-decoration-none fw-bold border-bottom border-primary border-2 pb-1">Sign In Instead</a>
            </div>
            
            <a routerLink="/home" class="text-secondary small text-decoration-none fw-bold mt-4 d-block text-center hover-primary">
              <i class="bi bi-arrow-left me-1"></i> Return Home
            </a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .ls-1 { letter-spacing: 0.1em; }
  .tracking-tight { letter-spacing: -0.025em; }
  .animate-fade-in { animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
  .z-index-3 { z-index: 3; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .hover-primary:hover { color: var(--accent) !important; tab-index: 0; }
  
  .role-option input { display: none; }
  .role-box { transition: all 0.3s ease; cursor: pointer; color: var(--secondary); background: white; border-color: #e2e8f0; }
  .role-option:hover .role-box { border-color: var(--accent); color: var(--accent); transform: translateY(-3px); }
  .role-option.active .role-box { background: var(--accent); color: white; border-color: var(--accent); shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
  
  .form-control:focus { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); border: 1px solid var(--accent) !important; }
</style>
