<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm px-3">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" routerLink="/home">
      <i class="bi bi-hospital me-2 text-info fs-4"></i>
      <span class="fw-bold fs-5 tracking-tight uppercase">SANJIVANI</span>
      <span class="ms-1 fw-light text-secondary fs-5">HEALTH</span>
    </a>
  </div>
</nav>

<div class="container py-5 d-flex justify-content-center min-vh-100 align-items-center mb-5">
  <div class="col-md-8 col-lg-5">
    <div class="card border-0 shadow-2xl p-5 bg-white rounded-5 animate-slide-up-slow">
      <div class="text-center mb-5">
        <h2 class="fw-black text-dark tracking-tightest mb-2 fs-2">CREATE ACCOUNT</h2>
        <div class="d-flex align-items-center justify-content-center gap-2">
            <span class="h-px bg-secondary opacity-25 w-12"></span>
            <p class="text-muted small fw-medium uppercase mb-0 tracking-widest">Select Medical Identity</p>
            <span class="h-px bg-secondary opacity-25 w-12"></span>
        </div>
      </div>

      <form (ngSubmit)="onRegister()">
        <!-- Role Selection Tabs -->
        <div class="btn-group w-100 mb-5 p-1 bg-light rounded-4 shadow-inner" role="group">
          <input type="radio" class="btn-check" name="role" id="role1" value="PATIENT" [(ngModel)]="user.role">
          <label class="btn btn-outline-primary border-0 rounded-4 py-2 fw-bold text-xs" for="role1">PATIENT</label>
          
          <input type="radio" class="btn-check" name="role" id="role2" value="DOCTOR" [(ngModel)]="user.role">
          <label class="btn btn-outline-primary border-0 rounded-4 py-2 fw-bold text-xs" for="role2">DOCTOR</label>
          
          <input type="radio" class="btn-check" name="role" id="role3" value="ADMIN" [(ngModel)]="user.role">
          <label class="btn btn-outline-primary border-0 rounded-4 py-2 fw-bold text-xs" for="role3">ADMIN</label>
        </div>

        <div class="row g-4">
          <div class="col-12">
            <label class="form-label text-xs fw-bold text-uppercase text-secondary letter-spacing-1 mb-2">FULL NAME</label>
            <div class="input-group group-focus">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-person text-secondary"></i></span>
              <input type="text" class="form-control border-0 bg-light py-2-5 shadow-none" [(ngModel)]="user.fullName" name="fullName" placeholder="John Doe" required>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label text-xs fw-bold text-uppercase text-secondary letter-spacing-1 mb-2">EMAIL</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-envelope text-secondary"></i></span>
              <input type="email" class="form-control border-0 bg-light py-2-5 shadow-none" [(ngModel)]="user.email" name="email" placeholder="john@med.com" required>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label text-xs fw-bold text-uppercase text-secondary letter-spacing-1 mb-2">MOBILE</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-phone text-secondary"></i></span>
              <input type="text" class="form-control border-0 bg-light py-2-5 shadow-none" [(ngModel)]="user.phoneNumber" name="phoneNumber" placeholder="+91 0000..." required>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label text-xs fw-bold text-uppercase text-secondary letter-spacing-1 mb-2">PASSWORD</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-lock text-secondary"></i></span>
              <input type="password" class="form-control border-0 bg-light py-2-5 shadow-none" [(ngModel)]="user.password" name="password" placeholder="••••••••" required>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label text-xs fw-bold text-uppercase text-secondary letter-spacing-1 mb-2">CONFIRM</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-shield-check text-secondary"></i></span>
              <input type="password" class="form-control border-0 bg-light py-2-5 shadow-none" [(ngModel)]="user.confirmPassword" name="confirmPassword" placeholder="••••••••" required>
            </div>
          </div>

          <div class="col-12 mt-5">
            <button type="submit" class="btn btn-dark w-100 py-3 rounded-4 shadow-lg-hover transition-all d-flex align-items-center justify-content-center gap-2">
              <i class="bi bi-clipboard-check fs-5"></i>
              <span class="fw-bold tracking-wider">SECURE REGISTRATION</span>
            </button>
          </div>
        </div>

        <div class="text-center mt-4">
          <p class="text-muted small">Already a member? <a routerLink="/patientlogin" class="text-primary fw-bold text-decoration-none border-bottom border-primary border-2 pb-1 hover-scale-110 d-inline-block ms-1">Sign In Instead</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
