<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
/>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-lg py-3">
  <div class="container-fluid px-lg-5">
    <a class="navbar-brand d-flex align-items-center" routerLink="/home">
      <i class="bi bi-calendar-check-fill me-3 text-info fs-3"></i> SANJIVANI <span class="ms-1 fw-bold text-uppercase">Scheduling</span>
    </a>
    <div class="ms-auto d-flex gap-3">
        <a class="btn btn-outline-light text-white rounded-pill px-4 fw-bold border-2 d-flex align-items-center gap-2" routerLink="/appointmentlist">
          <i class="bi bi-arrow-left-circle fs-5"></i> Back to Schedule
        </a>
    </div>
  </div>
</nav>

<div class="container py-5 animate-fade-in" style="max-width: 900px;">
  <div class="row g-4 align-items-start">
    <div class="col-lg-12">
      <div class="d-flex align-items-center justify-content-between mb-5">
        <div>
          <h2 class="fw-bold tracking-tight text-dark mb-1 d-flex align-items-center">
            <i class="bi bi-person-plus-fill me-3 text-success fs-2"></i> Register New Case Session
          </h2>
          <p class="text-secondary opacity-75 fs-5">Initiate a medical interaction protocol for clinic assessment.</p>
        </div>
        <div class="bg-success-subtle text-success p-4 rounded-5">
          <i class="bi bi-shield-plus fs-1"></i>
        </div>
      </div>

      <div class="card p-5 border-0 shadow-2xl bg-white rounded-5 animate-fade-in">
        <form (ngSubmit)="onSubmit()" class="needs-validation">
          <div class="row g-5">
            
            <!-- Tracking ID -->
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase ls-wide">Session ID Recognition</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0 px-4"><i class="bi bi-hash fs-5"></i></span>
                <input
                  type="number"
                  class="form-control bg-light border-0 py-3 shadow-none fw-bold text-primary"
                  id="id"
                  [(ngModel)]="appointment.id"
                  name="id"
                  placeholder="ID Tag"
                />
              </div>
            </div>

            <!-- Patient Name -->
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase ls-wide">Patient Entity Legal Name</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0 px-4"><i class="bi bi-person-check fs-5"></i></span>
                <input
                  type="text"
                  class="form-control bg-light border-0 py-3 shadow-none fw-medium"
                  id="name"
                  [(ngModel)]="appointment.name"
                  name="name"
                  placeholder="Identity Name"
                  required
                />
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase">Biometric Age Record</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0 px-4"><i class="bi bi-person-badge fs-5"></i></span>
                <input
                  type="number"
                  class="form-control bg-light border-0 py-3 shadow-none fw-medium"
                  id="age"
                  [(ngModel)]="appointment.age"
                  name="age"
                  placeholder="Recorded Years"
                />
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase">Contact Node / Number</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0 px-4"><i class="bi bi-telephone-plus-fill fs-5 text-primary"></i></span>
                <input
                  type="text"
                  class="form-control bg-light border-0 py-3 shadow-none fw-medium"
                  id="number"
                  [(ngModel)]="appointment.number"
                  name="number"
                  placeholder="Global Dial Link"
                />
              </div>
            </div>

            <div class="col-12">
              <label class="form-label fw-bold text-muted small text-uppercase">Interaction Symptoms / Case Reason</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0 px-4"><i class="bi bi-clipboard2-pulse fs-5 text-danger"></i></span>
                <textarea
                  class="form-control bg-light border-0 py-3 shadow-none fw-medium"
                  id="symptoms"
                  rows="4"
                  [(ngModel)]="appointment.symptoms"
                  name="symptoms"
                  placeholder="Identify patient symptoms or reason for clinical session..."
                ></textarea>
              </div>
            </div>

            <div class="col-12 mt-5">
              <button class="btn btn-success w-100 py-3 rounded-pill d-flex align-items-center justify-content-center gap-2 shadow-2xl transition-all" type="submit">
                <i class="bi bi-calendar-check-fill fs-4"></i> COMMITT CLINICAL SCHEDULING
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
