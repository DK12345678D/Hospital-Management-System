<div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
  <div class="card p-5 border-0 shadow-2xl bg-white rounded-5 col-md-6 col-lg-4 text-center animate-fade-in">
    
    <div class="bg-warning bg-opacity-10 d-inline-flex p-4 rounded-circle mb-4">
      <i class="bi bi-shield-lock text-warning fs-1"></i>
    </div>
    
    <h2 class="fw-bold text-dark mb-2">Forgot Password?</h2>
    <p class="text-secondary small mb-5 px-3">Provide your registered email identifier and we'll send you an OTP to initialize the reset protocols.</p>

    <div class="reset-methods d-flex justify-content-center gap-3 mb-5">
      <label class="method-option px-4 py-3 rounded-4 border shadow-sm transition-all cursor-pointer" [class.active]="resetMethod === 'email'">
        <input type="radio" name="method" value="email" [(ngModel)]="resetMethod" class="d-none">
        <i class="bi bi-envelope-at-fill d-block fs-3 mb-1"></i>
        <span class="small fw-bold text-uppercase ls-1">Email Path</span>
      </label>
      <label class="method-option px-4 py-3 rounded-4 border shadow-sm transition-all cursor-pointer" [class.active]="resetMethod === 'phone'">
        <input type="radio" name="method" value="phone" [(ngModel)]="resetMethod" class="d-none">
        <i class="bi bi-phone-vibrate-fill d-block fs-3 mb-1"></i>
        <span class="small fw-bold text-uppercase ls-1">Mobile Path</span>
      </label>
    </div>

    <form (ngSubmit)="onSubmit()">
      <!-- Email Path -->
      <div *ngIf="resetMethod === 'email'" class="mb-5 text-start animate-slide-up">
        <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">AUTH IDENTIFIER</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-envelope text-secondary"></i></span>
          <input type="email" class="form-control border-0 bg-light py-3 shadow-none" placeholder="Email@Hospital.com" [(ngModel)]="email" name="email" required>
        </div>
      </div>

      <!-- Mobile Path -->
      <div *ngIf="resetMethod === 'phone'" class="mb-5 text-start animate-slide-up">
        <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">MOBILE CONTACT</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-phone text-secondary"></i></span>
          <input type="text" class="form-control border-0 bg-light py-3 shadow-none" placeholder="+91 000 000 0000" [(ngModel)]="phone" name="phone" required>
        </div>
      </div>

      <button type="submit" class="btn btn-dark w-100 py-3 rounded-pill shadow-lg fw-bold tracking-widest d-flex align-items-center justify-content-center gap-2 mb-4">
        <i class="bi bi-shield-check"></i>
        {{ resetMethod === 'email' ? 'SEND RESET LINK' : 'SEND OTP VIA SMS' }}
      </button>

      <a routerLink="/patientlogin" class="text-secondary text-decoration-none small transition-all hover-translate-x-left">
        <i class="bi bi-arrow-left me-1"></i> Back to sign in
      </a>
    </form>

    <style>
      .method-option { color: #64748b; background: #fff; opacity: 0.6; }
      .method-option:hover { border-color: #0d6efd; color: #0d6efd; transform: translateY(-3px); }
      .method-option.active { background: #0d6efd; color: #fff; border-color: #0d6efd; opacity: 1; }
      .ls-1 { letter-spacing: 0.1em; }
      .animate-slide-up { animation: slideUp 0.4s ease-out; }
      @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </div>
</div>
