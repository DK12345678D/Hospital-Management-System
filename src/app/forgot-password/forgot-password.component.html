<div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
  <div class="card p-5 border-0 shadow-2xl bg-white rounded-5 col-md-6 col-lg-4 text-center animate-fade-in">
    
    <div class="bg-warning bg-opacity-10 d-inline-flex p-4 rounded-circle mb-4">
      <i class="bi bi-shield-lock text-warning fs-1"></i>
    </div>
    
    <h2 class="fw-bold text-dark mb-2">Forgot Password?</h2>
    <p class="text-secondary small mb-5 px-3">Provide your registered email identifier and we'll send you an OTP to initialize the reset protocols.</p>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-5 text-start">
        <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">AUTH IDENTIFIER</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-envelope text-secondary"></i></span>
          <input type="email" class="form-control border-0 bg-light py-3-5 shadow-none" placeholder="Email@Hospital.com" [(ngModel)]="email" name="email" required>
        </div>
      </div>

      <button type="submit" class="btn btn-dark w-100 py-3-5 rounded-4 shadow-sm fw-bold tracking-widest d-flex align-items-center justify-content-center gap-2 mb-4">
        <i class="bi bi-send-check"></i>
        REQUEST RESET OTP
      </button>

      <a routerLink="/patientlogin" class="text-secondary text-decoration-none small transition-all hover-translate-x-left">
        <i class="bi bi-arrow-left me-1"></i> Back to sign in
      </a>
    </form>
  </div>
</div>
