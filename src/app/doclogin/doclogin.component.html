<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100" style="background: url('medical_security_background_premium_1774851912935.png') no-repeat center center / cover;">
  <div class="overlay position-absolute w-100 h-100 top-0 start-0" style="background: linear-gradient(135deg, rgba(15, 23, 42, 0.75) 0%, rgba(6, 182, 212, 0.75) 100%); backdrop-filter: blur(10px);"></div>
  
  <div class="container position-relative z-index-3">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5 rounded-5 border border-white border-opacity-10 shadow-2xl animate-fade-in text-center" style="background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px);">
          
          <div class="brand-icon bg-info text-dark p-3 rounded-circle d-inline-flex mb-4 shadow-lg">
            <i class="bi bi-person-badge-fill fs-3"></i>
          </div>
          
          <h2 class="text-white fw-bold tracking-tight mb-1">Doctor Portal</h2>
          <p class="text-white-50 small mb-5 px-3">Secure identification for clinical specialists</p>

          <form (ngSubmit)="checkLogin()">
            <div class="field-group mb-4 text-start">
              <label class="form-label text-white-50 small fw-bold text-uppercase ls-1 mb-2">Clinical Email</label>
              <div class="input-group">
                <span class="input-group-text bg-white bg-opacity-10 border-0 text-white"><i class="bi bi-envelope-check-fill"></i></span>
                <input type="text" class="form-control bg-white bg-opacity-10 border-0 text-white py-3" placeholder="physician@sanjivani.com" [(ngModel)]="username" name="username" required>
              </div>
            </div>

            <div class="field-group mb-5 text-start">
              <div class="d-flex justify-content-between mb-2">
                <label class="form-label text-white-50 small fw-bold text-uppercase ls-1 mb-0">Password Key</label>
                <a routerLink="/forgot-password" class="text-info small text-decoration-none fw-bold">Forgot?</a>
              </div>
              <div class="input-group">
                <span class="input-group-text bg-white bg-opacity-10 border-0 text-white"><i class="bi bi-shield-lock-fill"></i></span>
                <input type="password" class="form-control bg-white bg-opacity-10 border-0 text-white py-3" placeholder="••••••••" [(ngModel)]="password" name="password" required>
              </div>
            </div>

            <button type="submit" [disabled]="loading" class="btn btn-info w-100 py-3 rounded-pill fw-bold shadow-lg d-flex align-items-center justify-content-center gap-2 mb-4">
              <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
              {{ loading ? 'Initialising...' : 'Verify & Access' }}
            </button>

            <div class="text-center">
              <span class="text-white-50 small">New clinician? </span>
              <a routerLink="/register" class="text-info small text-decoration-none fw-bold border-bottom border-info border-2 pb-1">Registry Enrollment</a>
            </div>

            <a routerLink="/home" class="text-white-50 small text-decoration-none fw-bold mt-4 d-block hover-white">
              <i class="bi bi-arrow-left me-1"></i> Return Home
            </a>
          </form>

          <div *ngIf="invalidLogin" class="alert bg-danger bg-opacity-20 text-danger border-0 rounded-4 mt-4 animate-shake py-2 small">
            Clinical authentication failed.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .ls-1 { letter-spacing: 0.1em; }
  .tracking-tight { letter-spacing: -0.025em; }
  .animate-fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .hover-white:hover { color: white !important; }
  .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
  .z-index-3 { z-index: 3; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }
  .form-control:focus { box-shadow: none; border: 1px solid rgba(255, 255, 255, 0.3) !important; }
</style>
