<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand py-2" routerLink="/home">
      <i class="bi bi-hospital me-2 text-info fs-4"></i>
      <span class="fw-bold tracking-tight">SANJIVANI</span>
      <span class="ms-1 fw-light text-secondary">HEALTH</span>
    </a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-lg p-4 bg-white rounded-4 animate-slide-up">
        
        <div class="text-center mb-4 mt-2">
          <div class="bg-primary bg-opacity-10 d-inline-flex p-3 rounded-circle mb-3">
            <i class="bi bi-person-heart text-primary fs-3"></i>
          </div>
          <h3 class="fw-bold text-dark mb-1">Patient Portal</h3>
          <p class="text-muted small px-3">Enter your medical credentials to access your health records and appointments.</p>
        </div>

        <form (ngSubmit)="checkLogin()">
          <div class="mb-4">
            <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">EMAIL IDENTIFIER</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-envelope text-secondary"></i></span>
              <input type="email" class="form-control border-0 bg-light py-2 shadow-none" placeholder="name@domain.com" [(ngModel)]="email" name="email" required>
            </div>
          </div>

          <div class="mb-5">
            <div class="d-flex justify-content-between">
              <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">AUTH PASSWORD</label>
              <a routerLink="/forgot-password" class="text-decoration-none small text-primary fw-medium opacity-75 hover-opacity-100">Forgot?</a>
            </div>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-lock text-secondary"></i></span>
              <input type="password" class="form-control border-0 bg-light py-2 shadow-none" placeholder="••••••••" [(ngModel)]="password" name="password" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 shadow-sm d-flex align-items-center justify-content-center gap-2 mb-3">
            <i class="bi bi-shield-lock-fill"></i>
            AUTHENTICATE ACCESS
          </button>

          <footer class="text-center mt-2 pb-2">
            <span class="text-muted fs-7">Don't have an account? </span>
            <a routerLink="/register" class="text-primary text-decoration-none fs-7 fw-bold border-bottom border-primary border-2 pb-1 ms-1">Sign Up</a>
          </footer>
        </form>

        <div *ngIf="invalidLogin" class="alert alert-danger border-0 rounded-3 mt-4 animate-shake py-2 fs-7 d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-triangle-fill"></i>
          Authentication failed. Check metrics and retry.
        </div>
      </div>
    </div>
  </div>
</div>
