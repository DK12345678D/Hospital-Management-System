<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
/>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 shadow-lg">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" routerLink="/home">
      <i class="bi bi-hospital-fill me-2 text-info fs-4"></i>
      <span class="fw-bold tracking-tight">SANJIVANI</span>
      <span class="ms-1 fw-light text-secondary">HEALTH</span>
    </a>
  </div>
</nav>

<div class="container-fluid py-5 bg-light min-vh-100 d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-2xl p-5 bg-white rounded-5 animate-scale-in">
          
          <div class="text-center mb-5 mt-2">
            <div class="bg-info bg-opacity-10 d-inline-flex p-3 rounded-circle mb-3">
              <i class="bi bi-shield-lock-fill text-info fs-3"></i>
            </div>
            <h3 class="fw-black text-dark tracking-tightest mb-1">ADMIN TERMINAL</h3>
            <p class="text-secondary small">Access system-level administrative protocols.</p>
          </div>

          <form (ngSubmit)="checkLogin()">
            <div class="mb-4">
              <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">SYSTEM IDENTIFIER (EMAIL)</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-person-badge text-secondary"></i></span>
                <input type="text" class="form-control border-0 bg-light py-2-5 shadow-none" placeholder="admin@sanjivani.com" [(ngModel)]="username2" name="username2" required>
              </div>
            </div>

            <div class="mb-5">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-0">AUTH SECRET</label>
                <a routerLink="/forgot-password" class="text-decoration-none small text-primary fw-medium opacity-75 hover-opacity-100">Forgot?</a>
              </div>
              <div class="input-group">
                <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-key text-secondary"></i></span>
                <input type="password" class="form-control border-0 bg-light py-2-5 shadow-none" placeholder="••••••••" [(ngModel)]="password2" name="password2" required>
              </div>
            </div>

            <button type="submit" [disabled]="loading" class="btn btn-dark w-100 py-3 rounded-4 shadow-sm d-flex align-items-center justify-content-center gap-2 mb-4 transition-all">
              <i *ngIf="!loading" class="bi bi-terminal-fill"></i>
              <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
              {{ loading ? 'OPENING SHELL...' : 'ROOT AUTHENTICATION' }}
            </button>

            <footer class="text-center pb-2">
              <span class="text-muted fs-7 opacity-75">Back to safety? </span>
              <a routerLink="/home" class="text-info text-decoration-none fs-7 fw-bold border-bottom border-info border-2 pb-1 ms-1">Exit Terminal</a>
            </footer>
          </form>

          <div *ngIf="invalidLogin" class="alert alert-danger border-0 rounded-4 mt-4 animate-shake py-2 fs-7 d-flex align-items-center gap-2">
            <i class="bi bi-x-octagon-fill"></i>
            Access denied. Log metrics saved.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
 .hover-glow:hover { box-shadow: 0 0 40px rgba(6, 182, 212, 0.4); border: 2px solid #06b6d4 !important; transition: 0.3s; }
</style>
