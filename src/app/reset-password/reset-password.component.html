<div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
  <div class="card p-5 border-0 shadow-2xl bg-white rounded-5 col-md-8 col-lg-5 animate-scale-in">
    
    <div class="text-center mb-5 mt-2">
      <div class="bg-success bg-opacity-10 d-inline-flex p-3 rounded-circle mb-3">
        <i class="bi bi-key-fill text-success fs-3"></i>
      </div>
      <h3 class="fw-bold text-dark mb-1">RESET PASSWORD</h3>
      <p class="text-secondary small">Define new authentication credentials carefully.</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="row g-4">
        
        <div class="col-12">
          <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">IDENTIFIER</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-person-check text-secondary"></i></span>
            <input type="text" class="form-control border-0 bg-light py-2-5 shadow-none" [(ngModel)]="data.identifier" name="email" readonly>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">OTP CODE</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-shield-lock text-secondary"></i></span>
            <input type="text" class="form-control border-0 bg-light py-2-5 shadow-none" placeholder="Enter 6 digit OTP" [(ngModel)]="data.otp" name="otp" required>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">NEW SECRET</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-lock text-secondary"></i></span>
            <input type="password" class="form-control border-0 bg-light py-2-5 shadow-none" placeholder="••••••••" [(ngModel)]="data.newPassword" name="newPassword" required>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label text-xs fw-bold text-uppercase text-muted letter-spacing-1 mb-2">CONFIRM</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-shield-check text-secondary"></i></span>
            <input type="password" class="form-control border-0 bg-light py-2-5 shadow-none" placeholder="••••••••" [(ngModel)]="data.confirmPassword" name="confirmPassword" required>
          </div>
        </div>

        <div class="col-12 mt-5">
           <button type="submit" class="btn btn-primary w-100 py-3-5 rounded-4 shadow-sm fw-bold tracking-widest d-flex align-items-center justify-content-center gap-2">
             <i class="bi bi-check2-circle fs-5"></i>
             UPDATE PASS-CODE
           </button>
        </div>

        <div class="text-center mt-4 pb-2">
          <p class="text-muted small">Need a fresh code? <a routerLink="/forgot-password" class="text-primary fw-bold text-decoration-none border-bottom border-primary border-2 pb-1 hover-opacity-75 ms-1">Try again</a></p>
        </div>
      </div>
    </form>
  </div>
</div>
